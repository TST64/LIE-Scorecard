<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LIE Scorecard</title>
    <!-- Tailwind CSS & FontAwesome über CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Deine CSS Datei -->
    <link rel="stylesheet" href="Style.css">
</head>
<body class="bg-stone-100 text-stone-900 font-sans antialiased">

    <!-- Globale Namespace Initialisierung -->
    <script>
        window.app = window.app || {};
        app.views = app.views || {};
        app.logic = app.logic || {};
        app.router = app.router || {};
    </script>

    <!-- App Shell Wrapper -->
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col relative pb-20">
        
        <!-- Header -->
        <header class="bg-emerald-700 text-white px-4 py-3 sticky top-0 z-40 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">LIE Scorecard</h1>
            <div class="flex items-center space-x-3">
                <button id="global-refresh-btn" onclick="app.logic.refreshGlobalAppData()" class="text-white p-1 touch-target text-base opacity-80 hover:opacity-100 transition focus:outline-none" title="Daten aktualisieren">
                    <i id="global-refresh-icon" class="fas fa-sync-alt"></i>
                </button>
                <button id="header-action-btn" onclick="app.router.navigate('spieltag_neu')" class="hidden text-white p-1 touch-target text-lg" title="Runde anlegen">
                    <i class="fas fa-plus-circle"></i>
                </button>
                <span id="header-role-badge" class="flex items-center text-xs opacity-75"></span>
                <button id="header-logout-btn" onclick="app.logic.logout()" class="hidden text-white opacity-80 hover:opacity-100 p-1 touch-target text-sm transition focus:outline-none" title="Abmelden">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
                <div id="connection-status" class="w-3 h-3 rounded-full bg-emerald-400"></div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="app-container" class="flex-1 p-4">
            <!-- Splash Screen -->
            <div id="app-loading" class="flex flex-col items-center justify-center pt-12 space-y-6">
                <div class="w-48 h-48 bg-stone-50 border border-stone-200 rounded-3xl p-2 shadow-md flex items-center justify-center overflow-hidden">
                    <img id="splash-logo" src="img/LIE_Logo II.jpeg" alt="LIE Logo" class="w-full h-full object-cover rounded-2xl" />
                </div>
                <div class="flex flex-col items-center space-y-2">
                    <i class="fas fa-circle-notch fa-spin text-2xl text-emerald-600"></i>
                    <p class="text-stone-500 text-xs font-semibold uppercase tracking-wider">Lade Clubhaus-Daten...</p>
                </div>
            </div>
        </main>

        <!-- Mobile Navigation Footer (Bottom Nav Bar) -->
        <nav id="bottom-nav" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-stone-200 py-2 px-3 flex justify-around items-center z-40 shadow-lg hidden">
            <button id="nav-dash" onclick="app.router.navigate('dashboard')" class="nav-btn flex flex-col items-center text-stone-400 hover:text-emerald-600 transition px-2 py-1 touch-target">
                <i class="fas fa-home text-base"></i>
                <span class="text-[10px] mt-0.5">Home</span>
            </button>
            <button id="nav-rounds" onclick="app.router.navigate('spieltage')" class="nav-btn flex flex-col items-center text-stone-400 hover:text-emerald-600 transition px-2 py-1 touch-target">
                <i class="fas fa-calendar-alt text-base"></i>
                <span class="text-[10px] mt-0.5">Runden</span>
            </button>
            <button id="nav-players" onclick="app.router.navigate('spieler')" class="nav-btn flex flex-col items-center text-stone-400 hover:text-emerald-600 transition px-2 py-1 touch-target">
                <i class="fas fa-users text-base"></i>
                <span class="text-[10px] mt-0.5">Gruppe</span>
            </button>
            <button id="nav-help" onclick="app.router.navigate('help')" class="nav-btn flex flex-col items-center text-stone-400 hover:text-emerald-600 transition px-2 py-1 touch-target">
                <i class="fas fa-question-circle text-base"></i>
                <span class="text-[10px] mt-0.5">Hilfe</span>
            </button>
        </nav>

    </div>

    <!-- Globaler Toast Container -->
    <div id="global-toast-container" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none"></div>

    <!-- Globales Confirmation Modal -->
    <div id="global-confirm-modal" class="fixed inset-0 z-50 bg-stone-900/60 backdrop-blur-xs hidden flex items-center justify-center p-4">
        <div id="confirm-modal-box" class="bg-white rounded-2xl max-w-xs w-full p-5 space-y-4 shadow-2xl transition-all duration-200 opacity-0 scale-95 border border-stone-100">
            <div class="flex items-start space-x-3">
                <div id="confirm-modal-icon-container" class="w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0 bg-emerald-100 text-emerald-700">
                    <i id="confirm-modal-icon" class="fas fa-question-circle text-sm"></i>
                </div>
                <div class="space-y-1">
                    <h3 id="confirm-modal-title" class="font-bold text-stone-800 text-sm">Titel</h3>
                    <p id="confirm-modal-message" class="text-stone-500 text-xs leading-relaxed">Nachricht</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-2">
                <button id="confirm-modal-cancel" class="bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold py-2.5 rounded-xl text-xs transition">Abbrechen</button>
                <button id="confirm-modal-submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs transition shadow-xs">Bestätigen</button>
            </div>
        </div>
    </div>

    <!-- Einbinden aller JS-Module -->
    <script src="App_Core.js"></script>
    <script src="App_View_Help.js"></script>
    <script src="App_Router.js"></script>
    <script src="App_Logic_Core.js"></script>
    <script src="App_Start.js"></script>
    <script src="Bridge_Fix.js"></script>
    <script src="Views_Login.js"></script>
    <script src="Views_Dashboard.js"></script>
    <script src="Views_Spieltage.js"></script>
    <script src="Views_ScoreEingabe.js"></script>
    <script src="Views_Leaderboard.js"></script>
    <script src="Views_AdminGruppe.js"></script>
    <script src="Views_SpielerEdit.js"></script>

</body>
</html>
