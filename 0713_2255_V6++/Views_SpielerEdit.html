<script>
// View: Spieler anlegen oder editieren
app.views.spieler_edit = function(spielerId)
{
    const s = spielerId ? app.state.spieler.find(function(p) { return String(p.id).trim() === String(spielerId).trim(); }) : null;
    const isNew = s === null;

    const title = isNew ? "Neuen Spieler anlegen" : "Spielerprofil bearbeiten";
    
    return `
        <div class="space-y-4">
            <div class="flex items-center space-x-2">
                <button onclick="app.router.navigate('spieler')" class="text-stone-500 touch-target"><i class="fas fa-arrow-left"></i></button>
                <h2 class="text-lg font-bold text-stone-800">${title}</h2>
            </div>

            <div class="bg-white border border-stone-200 rounded-2xl p-4 shadow-2xs space-y-4">
                
                <div class="grid grid-cols-3 gap-2">
                    <div class="flex flex-col space-y-1 col-span-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase">Spieler-ID *</label>
                        <input type="text" id="edit-sp-id" value="${!isNew ? s.id : ''}" ${!isNew ? 'disabled class="bg-stone-100 border border-stone-200 text-stone-400 text-xs rounded-xl px-3 py-2 outline-none font-bold"' : 'class="bg-stone-50 border border-stone-200 text-xs rounded-xl px-3 py-2 focus:border-emerald-600 outline-none font-bold" placeholder="z.B. 106"'} />
                    </div>
                    <div class="flex flex-col space-y-1 col-span-2">
                        <label class="text-[10px] font-bold text-stone-500 uppercase">Kürzel / Nickname *</label>
                        <input type="text" id="edit-sp-nickname" value="${!isNew ? s.nickname : ''}" class="bg-stone-50 border border-stone-200 text-xs rounded-xl px-3 py-2 focus:border-emerald-600 outline-none font-semibold" placeholder="z.B. Tiger" />
                    </div>
                </div>

                <div class="flex flex-col space-y-1">
                    <label class="text-[10px] font-bold text-stone-500 uppercase">Vollständiger Name *</label>
                    <input type="text" id="edit-sp-name" value="${!isNew ? s.name : ''}" class="bg-stone-50 border border-stone-200 text-xs rounded-xl px-3 py-2 focus:border-emerald-600 outline-none" placeholder="Vorname Nachname" />
                </div>

                <div class="flex flex-col space-y-1">
                    <label class="text-[10px] font-bold text-stone-500 uppercase">E-Mail-Adresse *</label>
                    <input type="email" id="edit-sp-email" value="${!isNew ? s.email : ''}" class="bg-stone-50 border border-stone-200 text-xs rounded-xl px-3 py-2 focus:border-emerald-600 outline-none font-mono" placeholder="spieler@example.com" />
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase">DGV-Handicap</label>
                        <input type="number" step="0.1" id="edit-sp-hcpoff" value="${!isNew ? s.hcpOfficial : '54.0'}" class="bg-stone-50 border border-stone-200 text-xs rounded-xl px-3 py-2 focus:border-emerald-600 outline-none font-bold" />
                    </div>
                    <div class="flex flex-col space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase">LIE-Handicap</label>
                        <input type="number" id="edit-sp-hcplie" value="${!isNew ? s.hcpLIE : '54'}" class="bg-stone-50 border border-stone-200 text-xs rounded-xl px-3 py-2 focus:border-emerald-600 outline-none font-bold text-emerald-700" />
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase">Abschlag (Tee)</label>
                        <select id="edit-sp-tee" class="bg-stone-50 border border-stone-200 text-xs rounded-xl px-3 py-2 focus:border-emerald-600 outline-none">
                            <option value="Gelb" ${!isNew && s.teeColor === 'Gelb' ? 'selected' : ''}>Gelb (Herren)</option>
                            <option value="Rot" ${!isNew && s.teeColor === 'Rot' ? 'selected' : ''}>Rot (Damen)</option>
                            <option value="Blau" ${!isNew && s.teeColor === 'Blau' ? 'selected' : ''}>Blau</option>
                            <option value="Weiß" ${!isNew && s.teeColor === 'Weiß' ? 'selected' : ''}>Weiß</option>
                        </select>
                    </div>
                    <div class="flex flex-col space-y-1">
                        <label class="text-[10px] font-bold text-stone-500 uppercase">Rolle / Rechte</label>
                        <select id="edit-sp-role" class="bg-stone-50 border border-stone-200 text-xs rounded-xl px-3 py-2 focus:border-emerald-600 outline-none">
                            <option value="Spieler" ${!isNew && s.role === 'Spieler' ? 'selected' : ''}>Spieler</option>
                            <option value="Spielleiter" ${!isNew && s.role === 'Spielleiter' ? 'selected' : ''}>Spielleiter</option>
                            <option value="Admin" ${!isNew && s.role === 'Admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    </div>
                </div>

                <button onclick="app.logic.savePlayer(${isNew})" id="save-player-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition text-sm shadow-xs mt-2">
                    <i class="fas fa-save mr-1"></i> Profil speichern
                </button>

                ${!isNew ? `
                    <div class="pt-3 border-t border-stone-100 flex flex-col space-y-2">
                        <button onclick="app.logic.resetPlayerPin('${s.id}')" id="reset-pin-btn" class="w-full bg-amber-50 hover:bg-amber-100 text-amber-800 border border-amber-200 font-bold py-2.5 rounded-xl transition text-xs">
                            <i class="fas fa-key mr-1"></i> PIN auf '4722' zurücksetzen
                        </button>
                        
                        <button onclick="app.logic.deletePlayer('${s.id}')" id="delete-player-btn" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold py-2.5 rounded-xl transition text-xs">
                            <i class="fas fa-user-slash mr-1"></i> Spieler unwiderruflich löschen
                        </button>

                        <div class="pt-4 mt-2 border-t border-stone-200/60">
                            <p class="text-[10px] text-red-500 font-bold uppercase tracking-wider mb-1 px-1">
                                <i class="fas fa-radiation"></i> Testbetrieb Gefahrenzone
                            </p>
                            <button onclick="app.logic.triggerMasterReset()" id="master-reset-db-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-xl transition text-xs shadow-xs">
                                <i class="fas fa-bomb mr-1"></i> Spieldaten komplett löschen
                            </button>
                        </div>
                ` : '<p class="text-[10px] text-stone-400 italic text-center">Hinweis: Neue Spieler erhalten automatisch die temporäre PIN "4722" und müssen diese beim ersten Login ändern.</p>'}
            </div>
        </div>
    `;
};
</script>
