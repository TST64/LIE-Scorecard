<script>
// Kapselt die Login-Ansichten im app.views Namespace
app.views.login = function()
{
    // Generiere die Optionen für das Spieler-Dropdown
    const spielerOptionen = app.state.spieler.map(function(s)
    {
        return `<option value="${s.id}">${s.nickname} (${s.name})</option>`;
    }).join('');

    return `
        <div class="space-y-6 pt-6 flex flex-col justify-center min-h-[70vh]">
            <div class="text-center space-y-2">
                <div class="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center text-2xl mx-auto shadow-2xs">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="text-xl font-black text-stone-800 tracking-wide">LIE Clubhaus Login</h2>
                <p class="text-xs text-stone-400 max-w-xs mx-auto">Wähle deinen Namen aus und gib deine persönliche PIN ein, um Scores zu erfassen.</p>
            </div>

            <div class="bg-stone-50 border border-stone-200 rounded-2xl p-5 shadow-2xs space-y-4">
                <div class="flex flex-col space-y-1">
                    <label class="text-xs font-bold text-stone-500 uppercase">Wer bist du?</label>
                    <!-- ID angepasst von 'login-spieler-id' auf 'login-spieler-select' -->
                    <select id="login-spieler-select" class="w-full bg-white border border-stone-200 rounded-xl px-3 py-3 text-sm focus:border-emerald-600 outline-none shadow-3xs font-medium">
                        <option value="" disabled selected>Namen auswählen...</option>
                        ${spielerOptionen}
                    </select>
                </div>

                <div class="flex flex-col space-y-1">
                    <label class="text-xs font-bold text-stone-500 uppercase">Deine PIN</label>
                    <input type="password" id="login-pin-input" inputmode="numeric" pattern="[0-8]*" maxlength="4" placeholder="••••" class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-center text-xl tracking-widest font-black focus:border-emerald-600 outline-none shadow-3xs">
                </div>

                <!-- Funktionsaufruf angepasst von 'verifyLogin()' auf 'submitPin()' -->
                <button onclick="app.logic.submitPin()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition text-sm shadow-xs mt-2 flex items-center justify-center space-x-2 touch-target">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Einloggen</span>
                </button>
            </div>
        </div>
    `;
};
</script>
