<body class="bg-stone-100 text-stone-900 font-sans antialiased">

    <!-- Etabliert das globale Anwendungs-Objekt als sicheres Fundament -->
    <script>
        window.app = window.app || {};
        app.views = app.views || {};
        app.logic = app.logic || {};
        app.router = app.router || {};
    </script>

    <!-- App Shell Wrapper (Maximale Breite auf Mobile optimiert) -->
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col relative pb-20">
        
        <!-- Globaler Header mit Rollen-Anzeige -->
        <header class="bg-emerald-700 text-white px-4 py-3 sticky top-0 z-40 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">LIE Scorecard</h1>
            <div class="flex items-center space-x-3">
                <button id="global-refresh-btn" onclick="app.logic.refreshGlobalAppData()" class="text-white p-1 touch-target text-base opacity-80 hover:opacity-100 transition focus:outline-none">
                    <i id="global-refresh-icon" class="fas fa-sync-alt"></i>
                </button>
                <button id="header-action-btn" onclick="app.router.navigate('spieltag_neu')" class="hidden text-white p-1 touch-target text-lg">
                    <i class="fas fa-plus-circle"></i>
                </button>
                
                <!-- Platzhalter für das diskrete Rollen-Symbol -->
                <span id="header-role-badge" class="flex items-center text-xs opacity-75"></span>
                
                <div id="connection-status" class="w-3 h-3 rounded-full bg-emerald-400"></div>
            </div>
        </header>

        <!-- Hauptinhalt (Dynamische Views werden hier injiziert) -->
        <main id="app-container" class="flex-1 p-4">
            <!-- Aufgewerteter Splash Screen mit deinem Logo -->
            <div id="app-loading" class="flex flex-col items-center justify-center pt-12 space-y-6">
                <div class="w-48 h-48 bg-stone-50 border border-stone-200 rounded-3xl p-2 shadow-md flex items-center justify-center overflow-hidden">
                    <img id="splash-logo" src="" alt="LIE Logo" class="w-full h-full object-cover rounded-2xl hidden" />
                </div>
                <div class="flex flex-col items-center space-y-2">
                    <i class="fas fa-circle-notch fa-spin text-2xl text-emerald-600"></i>
                    <p class="text-stone-500 text-xs font-semibold uppercase tracking-wider">Lade Clubhaus-Daten...</p>
                </div>
            </div>
        </main>

        <!-- Mobile Navigation Bar -->
        <nav id="bottom-nav" class="hidden absolute bottom-0 left-0 right-0 bg-white border-t border-stone-200 h-16 flex justify-around items-center z-40">
            <button id="nav-dash" onclick="app.router.navigate('dashboard')" class="nav-btn flex flex-col items-center justify-center w-full h-full text-emerald-700 font-medium text-xs">
                <i class="fas fa-home text-lg mb-0.5"></i>
                <span>Home</span>
            </button>
            <button id="nav-rounds" onclick="app.router.navigate('spieltage')" class="nav-btn flex flex-col items-center justify-center w-full h-full text-stone-400 text-xs">
                <i class="fas fa-calendar-alt text-lg mb-0.5"></i>
                <span>Runden</span>
            </button>
            <button id="nav-players" onclick="app.router.navigate('spieler')" class="nav-btn flex flex-col items-center justify-center w-full h-full text-stone-400 text-xs">
                <i class="fas fa-users text-lg mb-0.5"></i>
                <span>Gruppe</span>
            </button>
            <button id="nav-help" onclick="app.router.navigate('help')" class="nav-btn flex flex-col items-center justify-center w-full h-full text-stone-400 text-xs">
                <i class="fas fa-question-circle text-lg mb-0.5"></i>
                <span>Hilfe</span>
            </button>
            <button onclick="app.logic.logout()" class="nav-btn flex flex-col items-center justify-center w-full h-full text-stone-400 text-xs">
                <i class="fas fa-sign-out-alt text-lg mb-0.5"></i>
                <span>Logout</span>
            </button>
        </nav>

    </div>

    <!-- ========================================================================= -->
    <!-- Globale UI-Komponenten für Toasts und Modals -->
    <!-- ========================================================================= -->
    
    <!-- Toast Container (Oben zentriert, schwebt über allem) -->
    <div id="global-toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-full max-w-xs space-y-2 pointer-events-none px-4"></div>

    <!-- Custom Confirm Modal (Dialogbox) -->
    <div id="global-confirm-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-xs hidden">
        <div class="bg-white rounded-2xl max-w-sm w-full border border-stone-200 p-5 space-y-4 shadow-xl transform transition-all scale-95 opacity-0 duration-200" id="confirm-modal-box">
            <div class="flex items-start space-x-3">
                <div id="confirm-modal-icon-container" class="w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0">
                    <i id="confirm-modal-icon" class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="space-y-1">
                    <h3 id="confirm-modal-title" class="font-black text-stone-900 text-sm tracking-wide">Bestätigung erforderlich</h3>
                    <p id="confirm-modal-message" class="text-stone-500 text-xs leading-relaxed"></p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-2">
                <button id="confirm-modal-cancel" class="bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold py-2.5 rounded-xl text-xs transition">Abbrechen</button>
                <button id="confirm-modal-submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs transition shadow-xs">Bestätigen</button>
            </div>
        </div>
    </div>
